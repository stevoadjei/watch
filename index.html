<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caveman Boutique | 3D Configurator</title>
    <style>
        :root { --gold: #d4b265; --dark: #050505; }
        body {
            margin: 0; background-color: var(--dark);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        #viewer-wrapper {
            position: relative; width: 100vw; height: 85vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        #watch-container { width: 100%; height: 100%; }
        .controls-hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: var(--gold); letter-spacing: 2px; font-size: 12px; text-transform: uppercase;
            pointer-events: none; opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="viewer-wrapper">
        <div id="watch-container"></div>
        <div class="controls-hint">Drag to Rotate • Scroll to Zoom</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.146.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <script src="watch-3d.js"></script>
</body>
</html>
