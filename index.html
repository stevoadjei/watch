<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Watch Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center top, #2a2f41 0%, #07080d 52%, #020204 100%);
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #watch-container {
      width: min(100%, 960px);
      height: min(80vh, 680px);
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 40px 110px rgba(0, 0, 0, 0.45);
    }
    #watch-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .viewer-info {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.78);
      max-width: 780px;
      line-height: 1.65;
    }
    @media (max-width: 720px) {
      body { padding: 16px; }
      #watch-container { height: min(70vh, 520px); }
      .viewer-info { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="watch-container"></div>
  <div class="viewer-info">
    Premium 3D watch preview — rotate with your mouse or touch, zoom with the wheel, and inspect the sides and profile.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
  <script src="watch-3d.js"></script>
</body>
</html>
