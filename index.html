<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caveman Premium Configurator</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: 'Georgia', serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        
        .ui-overlay {
            position: absolute; top: 40px; width: 100%; text-align: center;
            pointer-events: none; text-transform: uppercase; letter-spacing: 5px;
        }
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">BUILDING VALUE...</div>
    <div class="ui-overlay">
        <h1 style="font-weight: 300; font-size: 1.2rem;">Caveman Watches</h1>
        <p style="font-size: 0.7rem; color: #d4b265;">Personalization Engine v1.0</p>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</body>
</html>
