<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Watch Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #ddd;
    }
    #watch-container {
      width: min(100%, 900px);
      height: min(85vh, 700px);
      border-radius: 20px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      cursor: grab;
    }
    #watch-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #watch-container:active { cursor: grabbing; }
    .viewer-info {
      margin-top: 18px;
      font-size: 15px;
      text-align: center;
      max-width: 900px;
      line-height: 1.6;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="watch-container"></div>
  <div class="viewer-info">
    Drag to rotate • Scroll/Wheel to zoom • Hover to inspect • Fully responsive • Watch image rendered as a 3D textured model
  </div>
  <div id="debug-status" style="margin-top:12px;font-size:0.95rem;color:#ff8e8e;opacity:0.85;text-align:center;"></div>


  <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

  <script src="watch-3d.js"></script>
</body>
</html>
